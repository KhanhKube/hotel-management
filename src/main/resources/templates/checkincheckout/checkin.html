<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Check-In - Hotel Management</title>
    <link rel="icon" href="/img/favicon.png" type="image/png">
    <link rel="stylesheet" href="/assets/vendors/mdi/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="/assets/vendors/css/vendor.bundle.base.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .card-title {
            color: #2c3e50;
            font-weight: 600;
        }
        .form-group label {
            font-weight: 600;
            color: #495057;
        }
        .btn-group .btn {
            margin-right: 5px;
        }
        .btn-group .btn:last-child {
            margin-right: 0;
        }
    </style>
</head>
<body>
    <div class="container-scroller">
        <!-- Sidebar -->
        <div th:replace="~{common/sidebar :: sidebar}"></div>
        
        <!-- Main Content -->
        <div class="main-panel">
            <div class="content-wrapper">
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-body">
                                <h4 class="card-title">
                                    <i class="mdi mdi-login"></i>
                                    Check-In Khách Hàng
                                </h4>
                                
                                <!-- Success/Error Messages -->
                                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                                    <i class="mdi mdi-check-circle"></i>
                                    <span th:text="${successMessage}"></span>
                                    <button type="button" class="close" data-dismiss="alert">
                                        <span>&times;</span>
                                    </button>
                                </div>
                                
                                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                                    <i class="mdi mdi-alert-circle"></i>
                                    <span th:text="${errorMessage}"></span>
                                    <button type="button" class="close" data-dismiss="alert">
                                        <span>&times;</span>
                                    </button>
                                </div>

                                <form th:action="@{/hotel-management/checkin}" method="post">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label for="roomId">Chọn phòng <span class="text-danger">*</span></label>
                                                <select class="form-control" id="roomId" name="roomId" required>
                                                    <option value="">-- Chọn phòng --</option>
                                                    <option th:each="room : ${availableRooms}" 
                                                            th:value="${room.roomId}" 
                                                            th:text="${room.roomNumber + ' - ' + room.roomType + ' (' + room.price + ' VNĐ)'}">
                                                    </option>
                                                </select>
                                            </div>
                                        </div>
                                        
                                        <div class="col-md-6">
                                            <div class="form-group">
                                                <label for="customerId">Chọn khách hàng <span class="text-danger">*</span></label>
                                                <select class="form-control" id="customerId" name="customerId" required>
                                                    <option value="">-- Chọn khách hàng --</option>
                                                    <option th:each="customer : ${customers}" 
                                                            th:value="${customer.userId}" 
                                                            th:text="${customer.firstName + ' ' + customer.lastName + ' (' + customer.phone + ')'}">
                                                    </option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label for="notes">Ghi chú</label>
                                        <textarea class="form-control" id="notes" name="notes" rows="3" 
                                                  placeholder="Nhập ghi chú (nếu có)"></textarea>
                                    </div>

                                    <div class="form-group">
                                        <div class="btn-group">
                                            <button type="submit" class="btn btn-success">
                                                <i class="mdi mdi-check"></i>
                                                Thực hiện Check-In
                                            </button>
                                            <button type="button" class="btn btn-secondary" onclick="resetForm()">
                                                <i class="mdi mdi-refresh"></i>
                                                Làm mới
                                            </button>
                                            <a href="/hotel-management/checkin-checkout" class="btn btn-primary">
                                                <i class="mdi mdi-arrow-left"></i>
                                                Quay lại
                                            </a>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/assets/vendors/js/vendor.bundle.base.js"></script>
    <script src="/assets/js/off-canvas.js"></script>
    <script src="/assets/js/hoverable-collapse.js"></script>
    <script src="/assets/js/misc.js"></script>
    <script src="/assets/js/settings.js"></script>
    <script src="/assets/js/todolist.js"></script>
    
    <script>
        function resetForm() {
            document.querySelector('form').reset();
            alert('Form đã được làm mới');
        }
    </script>
</body>
</html>
